# The environment in which the Nest application will run (e.g., development, production)
NODE_ENV=production
# The hostname or IP address where the Nest application will run
HOST=localhost
# The port on which the Nest application will listen
PORT=5000
# Directory where Nest plugins are stored
PLUGINS_DIR=/opt/nest-plugins
# Path to the log file
LOG_FILE_PATH=/var/log/nest/nest.log
# Maximum size of the log file in bytes
MAX_LOG_FILE_SIZE_BYTES=1048576
# API key for authenticating with external services (replace with your actual API key)
API_KEY=
# Comma-separated list of allowed IP addresses for accessing the Nest application (leave empty to allow all IPs - not recommended)
ALLOWED_IPS=127.0.0.1