name: Daily Dependency Vulnerability Audit

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js (from .nvmrc)
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --omit=dev --ignore-scripts

      - name: Attempt fix
        run: npm run fix:vulnerabilities

      - name: Create PR if lockfile changed
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): npm audit fix'
          title: 'chore(deps): npm audit fix'
          body: |
            Automated dependency fixes produced by `npm audit fix`.
            Please review the lockfile changes and run CI/tests before merging.
          branch: 'audit-fix-${{ github.run_id }}'
          labels: 'dependencies, automated'
