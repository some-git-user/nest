name: Dependency Review on Pull Requests for package.json and package-lock.json changes

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Dependency Review (same-repo PRs)
        id: review
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: actions/dependency-review-action@v4
        with:
          vulnerability-check: true
          license-check: false
          fail-on-severity: moderate
          comment-summary-in-pr: always
          show-patched-versions: true

      - name: Dependency Review (fork PRs)
        if: ${{ github.event.pull_request.head.repo.fork }}
        uses: actions/dependency-review-action@v4
        with:
          vulnerability-check: true
          license-check: false
          fail-on-severity: moderate
          comment-summary-in-pr: never
          show-patched-versions: true
