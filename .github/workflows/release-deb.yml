name: Release .deb (build:deb)

on:
  push:
    # release on semantic tags like v1.2.3
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional tag to use for the release (e.g. v1.2.3). If omitted, uses the tag that triggered the workflow or package.json version.'
        required: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Ensure make_deb.sh (and any make scripts) are executable
        run: |
          # make_deb.sh might live in various places; make it executable wherever it is found
          find . -type f -name "make_deb.sh" -exec chmod +x {} \; || true
          # also ensure npm scripts that call shell scripts have execution permission
          git ls-files | grep -E '\.sh$' || true
          echo "Executable shell scripts:"
          find . -type f -name "*.sh" -exec ls -la {} \;

      - name: Run build:deb (uses package.json script which should call make_deb.sh)
        id: build
        run: |
          echo "Running npm run build:deb"
          npm run build:deb

      - name: Find produced .deb files
        id: find_debs
        run: |
          shopt -s globstar nullglob
          mapfile -t debs < <(find . -type f -name "*.deb" -print)
          if [ ${#debs[@]} -eq 0 ]; then
            echo "No .deb files found after build!"
            echo "Listing files for debugging:"
            find . -maxdepth 3 -type f -print
            exit 1
          fi
          echo "Found .deb files:"
          for f in "${debs[@]}"; do
            echo " - $f"
          done
          # Export list for later steps
          printf "%s\n" "${debs[@]}" > debs-list.txt
          echo "debs_list=debs-list.txt" >> $GITHUB_OUTPUT

      - name: Determine release tag name
        id: vars
        run: |
          # if workflow triggered by push tag, use that; if workflow_dispatch input provided use that; otherwise use package.json version with v prefix
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            echo "Detected tag-triggered run: $tag"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
            echo "Using tag from workflow_dispatch input: $tag"
          else
            # Read package.json version (node must be available - this step runs after setup-node)
            ver=$(node -p "require('./package.json').version")
            tag="v${ver}"
            echo "Using package.json version: $tag"
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Generate changelog from commits since previous tag
        id: changelog
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.tag }}"
          echo "Generating changelog for $tag"

          # Find previous tag by creatordate, excluding the current tag
          prev_tag=$(git tag --sort=-creatordate | grep -v "^${tag}$" | head -n1 || true)

          # If no previous tag found, fall back to the initial commit
          if [ -z "$prev_tag" ]; then
            prev_tag=$(git rev-list --max-parents=0 HEAD)
            echo "No previous tag found; using initial commit: $prev_tag"
          else
            echo "Previous tag detected: $prev_tag"
          fi

          # Build range for git log (use prev_tag..HEAD)
          range="${prev_tag}..HEAD"

          # Generate a compact changelog: one line per commit with subject, short sha and author
          changelog=$(git --no-pager log --pretty=format:'- %s (%h) — %an' $range || true)

          if [ -z "$changelog" ]; then
            changelog="No changes detected since the previous release."
          fi

          # Add header and format
          cat > changelog.md <<EOF
          Changelog for ${tag}

          ${changelog}
          EOF

          # Expose multiline output via GITHUB_OUTPUT (proper multiline delim)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat changelog.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          release_name: 'Release ${{ steps.vars.outputs.tag }}'
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .deb assets to release (robust)
        run: |
          set -euo pipefail
          upload_url="${{ steps.create_release.outputs.upload_url }}"
          token="${{ secrets.GITHUB_TOKEN }}"

          if [ -z "$upload_url" ]; then
            echo "No upload_url from create_release step"
            exit 1
          fi

          if [ ! -f debs-list.txt ]; then
            echo "debs-list.txt not found"
            exit 1
          fi

          while IFS= read -r asset; do
            [ -z "$asset" ] && continue
            if [ ! -f "$asset" ]; then
              echo "Asset not found: $asset"
              exit 1
            fi

            name=$(basename "$asset")
            # URL-encode the asset name to be safe
            encoded_name=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$name")

            mime="application/vnd.debian.binary-package"
            echo "Uploading $asset as $name (encoded: $encoded_name)"

            # Use --fail so curl exits non-zero on HTTP errors, and show response for debugging
            resp=$(curl -sS --fail -X POST \
              -H "Authorization: token $token" \
              -H "Content-Type: $mime" \
              --data-binary @"$asset" \
              --write-out "\n%{http_code}" \
              "${upload_url}?name=${encoded_name}" || true)

            # Split response & HTTP code
            http_code=$(echo "$resp" | tail -n1)
            body=$(echo "$resp" | sed '$d' || true)

            echo "HTTP status: $http_code"
            if [ "$http_code" != "201" ] && [ "$http_code" != "200" ]; then
              echo "Upload failed for $name. Response body:"
              echo "$body"
              exit 1
            fi

            echo "Uploaded $name successfully."
          done < debs-list.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Done
        run: |
          echo "Release created: ${{ steps.create_release.outputs.html_url }}"
