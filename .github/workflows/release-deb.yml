name: Release .deb (build:deb)

on:
  push:
    # release on semantic tags like v1.2.3
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional tag to use for the release (e.g. v1.2.3)'
        required: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - run: npm ci

      - name: Run build:deb
        run: npm run build:deb

      - name: Determine release tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            ver=$(node -p "require('./package.json').version")
            tag="v${ver}"
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Your changelog generation script here
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "Changelog for ${{ steps.vars.outputs.tag }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: ./build_deb/nest-deb.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
