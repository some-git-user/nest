name: Release .deb (build:deb)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.3)'
        required: true

concurrency:
  group: release-deb-${{ github.event.inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Run build:deb
        run: npm run build:deb

      - name: Determine release tag
        id: vars
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag }}"

          if [[ -z "$tag" ]]; then
            echo "Input 'tag' must be provided" >&2
            exit 1
          fi

          # Enforce semantic version tags with a leading v, e.g. v1.2.3 or v1.2.3-rc.1
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag format '$tag'. Expected e.g. v1.2.3 or v1.2.3-rc.1" >&2
            exit 1
          fi

          # If tag already exists, require it to point to current commit to avoid accidental re-release ranges.
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            tag_commit=$(git rev-list -n1 "$tag")
            head_commit=$(git rev-parse HEAD)
            if [[ "$tag_commit" != "$head_commit" ]]; then
              echo "Tag '$tag' exists but does not point to HEAD. Refusing release." >&2
              echo "tag_commit=$tag_commit" >&2
              echo "head_commit=$head_commit" >&2
              exit 1
            fi
          fi

          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.tag }}"

          # Resolve target ref for changelog generation.
          # If the requested tag does not yet exist (workflow_dispatch), use HEAD.
          target_ref="$tag"
          if ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            target_ref="HEAD"
          fi

          # Previous semantic version tag excluding current tag.
          prev_tag=$(git tag --list 'v*' --sort=-version:refname | grep -Fxv "$tag" | head -n1 || true)

          if [ -n "$prev_tag" ]; then
            commits=$(git log --pretty='- %s (%h)' "$prev_tag..$target_ref")
          else
            commits=$(git log --pretty='- %s (%h)' -n 50 "$target_ref")
          fi

          if [ -z "$commits" ]; then
            commits="- No commit messages found"
          fi

          changelog_path="$RUNNER_TEMP/release-body.md"
          {
            echo "## Commit Messages"
            echo "$commits"
          } > "$changelog_path"

          echo "changelog_path=$changelog_path" >> $GITHUB_OUTPUT
          echo "previous_tag=$prev_tag" >> $GITHUB_OUTPUT

      - name: Verify release asset exists
        run: |
          set -euo pipefail
          test -s ./build_deb/nest-deb.deb

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.vars.outputs.tag }}
          tag_name: ${{ steps.vars.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: ${{ steps.changelog.outputs.changelog_path }}
          generate_release_notes: true
          previous_tag: ${{ steps.changelog.outputs.previous_tag }}
          files: ./build_deb/nest-deb.deb
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
